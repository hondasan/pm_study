<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <style>
    .bg-rect {
      fill: #1E3A60;
      transition: fill 0.3s ease;
    }
    .chart-line {
      stroke: #FFFFFF;
    }
    .chart-node {
      fill: #FFFFFF;
    }
    .book-page-left {
      fill: #FFFFFF;
      opacity: 0.15;
    }
    .book-page-right {
      fill: #FFFFFF;
      opacity: 0.3;
    }
    .spine {
      stroke: #FFFFFF;
      opacity: 0.25;
    }
    @media (prefers-color-scheme: dark) {
      .bg-rect {
        fill: #6C9BD2;
      }
      .chart-line {
        stroke: #1A1B2E;
      }
      .chart-node {
        fill: #1A1B2E;
      }
      .book-page-left {
        fill: #1A1B2E;
        opacity: 0.2;
      }
      .book-page-right {
        fill: #1A1B2E;
        opacity: 0.35;
      }
      .spine {
        stroke: #1A1B2E;
        opacity: 0.3;
      }
    }
  </style>
  <rect class="bg-rect" x="0" y="0" width="128" height="128" rx="28" />
  
  <!-- 本のページ -->
  <path class="book-page-left" d="M64 96 C64 96 48 84 28 84 L28 40 C48 40 64 52 64 52 Z" />
  <path class="book-page-right" d="M64 96 C64 96 80 84 100 84 L100 40 C80 40 64 52 64 52 Z" />
  <line class="spine" x1="64" y1="44" x2="64" y2="96" stroke-width="3" stroke-linecap="round" />

  <!-- 折れ線グラフと矢印 -->
  <path class="chart-line" d="M 36 74 L 52 60 L 68 68 L 92 38" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path class="chart-line" d="M 80 38 L 92 38 L 92 50" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- ノード -->
  <circle class="chart-node" cx="36" cy="74" r="7" />
  <circle class="chart-node" cx="52" cy="60" r="7" />
  <circle class="chart-node" cx="68" cy="68" r="7" />
  <circle class="chart-node" cx="92" cy="38" r="7" />
</svg>
